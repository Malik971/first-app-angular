<label *ngFor="let c of listeComponents" (click)="onSelectedComponent(c)" [class.selected]="c==myComponent">{{c}}
</label>
<br>
<hr>
<br>

<div [ngSwitch]="myComponent">
    <app-calculatrice *ngSwitchCase="'Calculatrice'" />
    <app-color *ngSwitchCase="'Color'" />
    <app-produits *ngSwitchCase="'Produits'" />
    <app-tva *ngSwitchCase="'Tva'" />
    <div *ngSwitchDefault>
        username: <input [(ngModel)]="username">

        {{username}}
        <br>
        <button [style.color]="colorBouton" (click)="onAction()">Hello</button>
        <br>

        message : <b>{{message}}</b>
    </div>
</div>
