<div class="c1">
  <h3>Calculatrice Angular</h3>

  <label>a:</label><input type="number" [(ngModel)]="a" /><br />
  <label>b:</label><input type="number" [(ngModel)]="b" /><br />

  <label> résultat : </label>
  <span [style.font-weight]="res > 0 ? 'bold' : 'normal'" [class.negatif]="res < 0"> {{ res }}</span
  ><br />

  <button (click)="onAction('+')">+ (add)</button>
  <button (click)="onAction('-')">- (subtract)</button>
  <button (click)="onAction('*')">* (multi)</button>

  <br />

  <input type="checkbox" [(ngModel)]="montrerHistorique" />Voir l'historique <br />

  <ul *ngIf="montrerHistorique">
    <li *ngFor="let h of historiqueCalcule">{{ h }}</li>
  </ul>

  <div class="c2" (mousemove)="onMouseMove($event)"
                  (mouseout)="onMouseLeave($event)"
  >
    Zone à survoler avec la souris. <br />
    {{ x }} - {{ y }}
  </div>
</div>
