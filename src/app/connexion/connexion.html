<form #formUser="ngForm">
  <div class="form-group row">
    <h3>Connexion</h3>
    <!-- {{ user.id }} <br /> -->
    <label class="col-sm-4 text-sm-end"> username </label>
    <div class="col-sm-8">
      <input
        class="form-control mb-1"
        name="username"
        [(ngModel)]="user.userName"
        required
        pattern="^[a-zA-Z].+"
        #usernameFormCtrl="ngModel"
      />
      <br />
    </div>
  </div>
  <!-- <div [hidden]="usernameFormCtrl.valid">
              username is required
          </div> -->
  <div class="form-group row">
    <label class="col-sm-4 text-sm-end"> newPassword </label>
    <div class="col-sm-8">
      <input
        name="newpassword"
        class="form-control mb-1"
        [(ngModel)]="user.newPassword"
        required
        minlength="3"
      />
      <br />
    </div>
  </div>
  <div class="col-sm-8 offset-sm-4">
    <button
      class="btn btn-primary"
      (click)="onSave()"
      (click)="onFetchFromUsername()"
      [disabled]="!formUser.form.valid"
    >
      Connexion
    </button>
    &nbsp;
  </div>
</form>
